name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - run: clojure -M:test
      - run: bb scripts/check-cli-contract.bb lang/cli.edn
      - run: bb scripts/check-package-contract.bb
      - run: node --check docs/site/app.js
      - run: node scripts/check-lab-site.mjs
      - name: ensure Rust files stay out
        run: |
          if find . \
            \( -name Cargo.toml -o -name Cargo.lock -o -name '*.rs' -o -name 'rust-toolchain*' -o -path './.cargo/*' \) \
            -print -quit | grep -q .; then
            find . \( -name Cargo.toml -o -name Cargo.lock -o -name '*.rs' -o -name 'rust-toolchain*' -o -path './.cargo/*' \) -print
            exit 1
          fi
