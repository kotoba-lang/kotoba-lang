name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@stable
      - run: node --check docs/site/app.js
      - run: node scripts/check-lab-site.mjs
      - run: cargo fmt --check
      - run: cargo test --target aarch64-apple-darwin
