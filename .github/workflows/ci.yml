name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  installed-kotoba-pilot:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify migrated CLJC kernel with released native Kotoba
        shell: bash
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/kotoba-v0.6.22"
          cli_dir="$RUNNER_TEMP/kotoba-cli"
          mkdir -p "$release_dir" "$cli_dir"
          curl -L --fail --silent --show-error \
            -o "$release_dir/kotoba-linux-amd64.tar.gz" \
            https://github.com/kotoba-lang/kotoba/releases/download/v0.6.22/kotoba-linux-amd64.tar.gz
          curl -L --fail --silent --show-error \
            -o "$release_dir/kotoba-linux-amd64.tar.gz.sha256" \
            https://github.com/kotoba-lang/kotoba/releases/download/v0.6.22/kotoba-linux-amd64.tar.gz.sha256
          (cd "$release_dir" && sha256sum -c kotoba-linux-amd64.tar.gz.sha256)
          tar -xzf "$release_dir/kotoba-linux-amd64.tar.gz" -C "$cli_dir"
          "$cli_dir/kotoba" compile lang/migration-pilots/demo-util.kotoba \
            --target web --output "$RUNNER_TEMP/demo-util.mjs" --json
          grep -q 'kotoba.artifact/provenance' "$RUNNER_TEMP/demo-util.mjs.manifest.edn"
          node scripts/test-installed-kotoba-pilot.mjs "$RUNNER_TEMP/demo-util.mjs"
          if "$cli_dir/kotoba" compile lang/migration-pilots/negative-eval.kotoba \
            --target web --output "$RUNNER_TEMP/forbidden.mjs" --json; then
            echo "expected forbidden eval to be rejected" >&2
            exit 1
          fi

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --global nbb@1.4.208
      - run: clojure -M:test
      - run: clojure -M:lint
      - run: nbb scripts/check-cli-contract.cljs lang/cli.edn
      - run: nbb scripts/check-package-contract.cljs
      - run: nbb --classpath src scripts/check-capability-values.cljs
      - run: nbb scripts/check-legacy-runtime-absence.cljs
