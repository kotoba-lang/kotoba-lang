name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - run: clojure -M:test
      - run: bb scripts/check-cli-contract.bb lang/cli.edn
      - run: bb scripts/check-package-contract.bb
      - run: bb scripts/check-capability-values.bb
      - run: bb scripts/check-legacy-runtime-absence.bb
